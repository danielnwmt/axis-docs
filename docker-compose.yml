version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: axisdocs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: axisdocs
      POSTGRES_PASSWORD: axisdocs2024
      POSTGRES_DB: axisdocs
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axisdocs"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: axisdocs-app
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
